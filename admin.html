<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | rep al & m</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .login-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e1e1e 0%, #121212 100%);
        }

        .login-card {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(20px);
            padding: 4rem;
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .login-card .logo {
            font-size: 2.5rem;
            margin-bottom: 3rem;
        }

        .form-group {
            margin-bottom: 2rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.8rem;
            color: var(--text-gray);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 1.2rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 0;
            transition: var(--transition);
        }

        .form-group input:focus {
            border-color: var(--accent-gold);
            outline: none;
        }

        .error-box {
            background: rgba(255, 77, 77, 0.1);
            color: #ff4d4d;
            padding: 1rem;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 77, 77, 0.3);
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-page">
        <div class="login-card">
            <div class="logo">rep al & m</div>
            <div id="login-error" class="error-box">Access Denied. Check credentials.</div>
            <div class="form-group">
                <label>Administrator Identity</label>
                <input type="text" id="username" placeholder="Username">
            </div>
            <div class="form-group">
                <label>Secure Access Key</label>
                <input type="password" id="password" placeholder="Password">
            </div>
            <button class="btn-gold" style="width: 100%; padding: 1.2rem" onclick="handleLogin()">Grant Access</button>
            <p style="margin-top: 2rem;"><a href="index.html"
                    style="color: var(--text-gray); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">&larr;
                    Return to Showroom</a></p>
        </div>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === 'admin' && pass === 'admin') {
                localStorage.setItem('isAdmin', 'true');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }
    </script>
</body>

</html>
