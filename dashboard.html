<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Console | rep al & m</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: var(--secondary-dark);
            border-right: 1px solid var(--glass-border);
            padding: 4rem 2rem;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .sidebar h2 {
            margin-bottom: 4rem;
            color: var(--accent-gold);
        }

        .main-content {
            padding: 4rem 6rem;
        }

        .section-title {
            margin-bottom: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card {
            background: var(--secondary-dark);
            border: 1px solid var(--glass-border);
            padding: 2.5rem;
            margin-bottom: 3rem;
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            color: var(--accent-gold);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 1.5rem 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        td {
            padding: 1.5rem 1rem;
            border-bottom: 1px solid var(--glass-border);
            font-size: 0.9rem;
        }

        .status-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(212, 175, 55, 0.1);
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
        }

        .status-delivered {
            background: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
            border: 1px solid #2ecc71;
        }

        .action-btn {
            background: none;
            border: 1px solid var(--glass-border);
            color: var(--text-gray);
            padding: 0.5rem;
            cursor: pointer;
            transition: var(--transition);
            margin-right: 0.5rem;
        }

        .action-btn:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        form div {
            margin-bottom: 2rem;
        }

        label {
            display: block;
            margin-bottom: 0.8rem;
            color: var(--text-gray);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        input,
        select {
            width: 100%;
            padding: 1rem;
            background: var(--primary-dark);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 0;
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .item-row {
            display: flex;
            gap: 1rem;
            align-items: center;
            font-size: 0.85rem;
        }

        .item-thumb {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 2px;
        }

        .item-note {
            font-style: italic;
            color: var(--accent-gold);
            font-size: 0.75rem;
            display: block;
        }

        .category-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--primary-dark);
            padding: 0.5rem 1rem;
            border: 1px solid var(--glass-border);
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .remove-cat {
            cursor: pointer;
            color: #ff4d4d;
            font-size: 1.2rem;
        }

        @media (max-width: 1024px) {
            .admin-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                height: auto;
                position: relative;
            }

            .main-content {
                padding: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="logo" style="margin-bottom: 4rem;">rep al & m</div>
            <nav>
                <ul style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <li><a href="#overview" style="color: var(--accent-gold)">Inquiries</a></li>
                    <li><a href="#collections">Collections</a></li>
                    <li><a href="#uploads">Add Piece</a></li>
                    <li><a href="#settings">Config</a></li>
                    <li><a href="index.html">View App</a></li>
                    <li>
                        <hr style="border-color: var(--glass-border)">
                    </li>
                    <li><button onclick="logout()"
                            style="background: none; border: none; color: #ff4d4d; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;">Logout</button>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="section-title">
                <h2>Customer Inquiries</h2>
            </header>

            <div class="card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Client</th>
                                <th>Requested Items</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="selections-table"></tbody>
                    </table>
                </div>
            </div>

            <header class="section-title" id="collections">
                <h2>Manage Collections</h2>
            </header>
            <div class="card">
                <div id="categories-list" style="margin-bottom: 2rem;"></div>
                <div style="display: flex; gap: 1rem;">
                    <input type="text" id="new-cat" placeholder="Add new collection name (e.g. Living Room)">
                    <button class="btn-gold" onclick="addCategory()" style="padding: 1rem 2rem;">Add</button>
                </div>
            </div>

            <header class="section-title" id="uploads">
                <h2>Publish New Piece</h2>
            </header>

            <div class="card">
                <form id="uploadForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                        <div>
                            <label>Title</label>
                            <input type="text" id="itemName" required>
                        </div>
                        <div>
                            <label>Collection</label>
                            <select id="itemCat"></select>
                        </div>
                    </div>
                    <div>
                        <label>Artisan Description</label>
                        <input type="text" id="itemDesc" required>
                    </div>
                    <div>
                        <label>High-Res Image</label>
                        <input type="file" id="itemImg" accept="image/*" required onchange="previewImage(event)">
                    </div>
                    <div id="imagePreview"
                        style="margin-bottom: 2rem; border: 1px solid var(--glass-border); height: 200px; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                        <span style="color: var(--text-gray)">No Preview</span>
                    </div>
                    <button type="submit" class="btn-gold" style="width: 100%; padding: 1.2rem">Publish to
                        Showroom</button>
                </form>
            </div>

            <header class="section-title" id="settings">
                <h2>Admin Config</h2>
            </header>
            <div class="card">
                <div>
                    <label>WhatsApp Registry Number</label>
                    <input type="text" id="wa-number" placeholder="234..." onchange="saveSettings()">
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/config.js"></script>

    <script>
        lucide.createIcons();
        if (localStorage.getItem('isAdmin') !== 'true') window.location.href = 'admin.html';

        function logout() {
            localStorage.removeItem('isAdmin');
            window.location.href = 'index.html';
        }

        // Settings
        function saveSettings() {
            const waNumber = document.getElementById('wa-number').value;
            settingsRef.doc('admin').set({ waNumber }, { merge: true })
                .then(() => alert('Settings updated!'))
                .catch(err => console.error("Error saving settings:", err));
        }

        // Load initial settings
        settingsRef.doc('admin').get().then(doc => {
            if (doc.exists) document.getElementById('wa-number').value = doc.data().waNumber || '';
        });

        // Collections Management
        function renderCategories() {
            const list = document.getElementById('categories-list');
            const select = document.getElementById('itemCat');

            collectionsRef.doc('main').onSnapshot(doc => {
                if (!doc.exists) return;
                const cats = doc.data().list;

                list.innerHTML = cats.map(c => `
                    <div class="category-tag">
                        ${c} <span class="remove-cat" onclick="removeCategory('${c}')">&times;</span>
                    </div>
                `).join('');

                select.innerHTML = cats.map(c => `<option value="${c.toLowerCase()}">${c}</option>`).join('');
            });
        }

        function addCategory() {
            const input = document.getElementById('new-cat');
            const val = input.value.trim();
            if (!val) return;

            collectionsRef.doc('main').get().then(doc => {
                let cats = doc.exists ? doc.data().list : [];
                if (cats.includes(val)) return alert('Category exists');
                cats.push(val);
                collectionsRef.doc('main').set({ list: cats })
                    .then(() => input.value = '')
                    .catch(err => console.error("Error adding category:", err));
            });
        }

        function removeCategory(cat) {
            if (!confirm(`Remove "${cat}"?`)) return;
            collectionsRef.doc('main').get().then(doc => {
                if (!doc.exists) return;
                let cats = doc.data().list.filter(c => c !== cat);
                collectionsRef.doc('main').set({ list: cats });
            });
        }

        // Selections / Inquiries
        function renderSelections() {
            const table = document.getElementById('selections-table');

            // Get WA number first for links
            settingsRef.doc('admin').get().then(adminDoc => {
                const waNumber = adminDoc.exists ? adminDoc.data().waNumber : '';

                // Listen to inquiries
                inquiriesRef.orderBy('timestamp', 'desc').onSnapshot(snapshot => {
                    table.innerHTML = snapshot.docs.map(doc => {
                        const s = doc.data();
                        const id = doc.id;
                        const dateStr = s.timestamp ? s.timestamp.toDate().toLocaleString() : 'Just now';
                        const itemsSummary = s.items.map(i => i.name + (i.note ? ` (${i.note})` : '')).join(', ');
                        const waMessage = `Hello ${s.customerName}! Regarding your selection from rep al & m: ${itemsSummary}`;
                        const waLink = `https://wa.me/${waNumber}?text=${encodeURIComponent(waMessage)}`;

                        return `
                        <tr>
                            <td>
                                <div style="font-weight: 600;">${s.customerName}</div>
                                <div style="font-size: 0.8rem; color: var(--accent-gold); margin-bottom: 0.3rem;">${s.customerPhone || 'No Phone'}</div>
                                <div style="font-size: 0.7rem; color: var(--text-gray)">${dateStr}</div>
                            </td>
                            <td>
                                <div class="item-list">
                                    ${s.items.map(i => `
                                        <div class="item-row">
                                            <img src="${i.image}" class="item-thumb">
                                            <div>
                                                <strong>${i.name}</strong>
                                                ${i.note ? `<span class="item-note">Note: ${i.note}</span>` : ''}
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </td>
                            <td><span class="status-badge status-${s.status}">${s.status}</span></td>
                            <td>
                                <button class="action-btn" onclick="updateStatus('${id}', 'delivered')" title="Mark as Delivered"><i data-lucide="check"></i></button>
                                <a href="${waLink}" target="_blank" class="action-btn" title="Contact on WhatsApp"><i data-lucide="message-circle"></i></a>
                                <button class="action-btn" onclick="removeSelection('${id}')" title="Delete"><i data-lucide="trash-2"></i></button>
                            </td>
                        </tr>
                    `}).join('');
                    lucide.createIcons();
                });
            });
        }

        function updateStatus(id, status) {
            inquiriesRef.doc(id).update({ status })
                .catch(err => console.error("Error updating status:", err));
        }

        function removeSelection(id) {
            if (confirm('Permanently remove this record?')) {
                inquiriesRef.doc(id).delete()
                    .catch(err => console.error("Error deleting record:", err));
            }
        }

        // Image Preview and Upload via Cloudinary
        let selectedFileData = null;

        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            selectedFileData = file;
            const reader = new FileReader();
            reader.onload = function () {
                document.getElementById('imagePreview').innerHTML = `<img src="${reader.result}" style="max-height: 100%">`;
            }
            reader.readAsDataURL(file);
        }

        document.getElementById('uploadForm').onsubmit = async function (e) {
            e.preventDefault();
            if (!selectedFileData) return alert('Select an image');

            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerText = 'Uploading to Cloud...';

            try {
                // 1. Upload to Cloudinary
                const formData = new FormData();
                formData.append('file', selectedFileData);
                formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (!data.secure_url) throw new Error('Cloudinary upload failed');

                // 2. Save to Firestore
                await furnitureRef.add({
                    name: document.getElementById('itemName').value,
                    desc: document.getElementById('itemDesc').value,
                    cat: document.getElementById('itemCat').value,
                    image: data.secure_url,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert('Piece published to Showroom!');
                location.reload();
            } catch (err) {
                console.error(err);
                alert('Upload failed: ' + err.message);
                btn.disabled = false;
                btn.innerText = 'Publish to Showroom';
            }
        };

        renderCategories();
        renderSelections();
    </script>
</body>

</html>
